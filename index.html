<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1,viewport-fit=cover" name="viewport"/>
<title>ヴァイオリン れっすん</title>
<style>
:root{
  --bg:#fff7f0;--paper:#fff;--ink:#24324a;--pink:#ff8aa1;--blue:#6aa9ff;
  --green:#61c98f;--yellow:#ffd86b;--line:#eadfd7;--soft:#fff0f4;
}
*{box-sizing:border-box}
body{
  margin:0;background:linear-gradient(135deg,#fff7f0,#f7fbff);
  color:var(--ink);font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
}
header{
  position:sticky;top:0;z-index:20;background:rgba(255,255,255,.95);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
  padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:44px;height:44px;border-radius:14px;background:var(--pink);display:grid;place-items:center;font-size:25px;color:white}
h1{font-size:20px;margin:0}
.small{font-size:13px;color:#667085}
.top-actions{display:flex;gap:8px;flex-wrap:wrap}
button,input,select,textarea{font:inherit}
button{
  border:0;border-radius:14px;padding:11px 14px;background:#fff;border:1px solid var(--line);
  cursor:pointer;font-weight:700;min-height:44px;
}
button.primary{background:var(--pink);color:#fff;border-color:var(--pink)}
button.blue{background:var(--blue);color:#fff;border-color:var(--blue)}
button.green{background:var(--green);color:#fff;border-color:var(--green)}
button.yellow{background:var(--yellow);color:#5b4611;border-color:var(--yellow)}
main{max-width:1440px;margin:auto;padding:16px}
.top-grid{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start}
.card{
  background:var(--paper);border:1px solid var(--line);border-radius:20px;
  box-shadow:0 12px 30px rgba(70,50,40,.08);padding:16px;
}
.card h2{font-size:18px;margin:0 0 12px}
.stopwatch-time{
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  font-size:42px;text-align:center;font-weight:800;letter-spacing:.04em;padding:10px 0;
}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.video-wrap{position:relative;padding-top:56.25%;border-radius:16px;overflow:hidden;background:#000}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.video-controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.content-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:16px}
.left-stack{display:grid;gap:16px}
.practice-list{display:grid;gap:9px}
.practice-item{
  display:grid;grid-template-columns:42px minmax(0,1fr) 58px;gap:7px;align-items:center;
  padding:8px;border:1px solid var(--line);border-radius:14px;background:#fff;
}
.practice-item input[type="checkbox"]{width:26px;height:26px}

.goal{
  width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:16px;
}
.cheer{
  margin-top:10px;padding:12px;border-radius:14px;background:#fff6cf;text-align:center;font-weight:800;display:none;
}
.stickers{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}
.sticker{padding:10px 4px;border-radius:14px;background:#f7f7f7;opacity:.35}
.sticker.on{opacity:1;background:#fff6cf}
.calendar-title{
  text-align:center;
  font-size:20px;
  font-weight:800;
  margin-bottom:10px;
}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day{aspect-ratio:1;border-radius:10px;background:#f6f6f6;display:grid;place-items:center;font-size:12px}
.day.done{background:#ffe2ea}
.section{padding:12px 0;border-bottom:1px solid var(--line)}
.section:last-child{border-bottom:0}
.section h3{font-size:15px;margin:0 0 10px}
.note-buttons,.pitch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.note-buttons button.active,.pitch-grid button.active{background:var(--blue);color:#fff}
.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
label{font-size:13px;color:#667085;display:block;margin:0 0 5px}
input,select,textarea{
  width:100%;border:1px solid var(--line);border-radius:12px;padding:11px;background:#fff;
}
.sheet{min-height:740px}
.meta{display:grid;grid-template-columns:1.2fr 1.2fr 1fr 1fr;gap:10px;margin-bottom:12px;align-items:center}
.score-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff;padding:12px}
svg{display:block;min-width:900px;width:100%;height:auto}
.status{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.pill{background:#f3f4f6;border-radius:999px;padding:7px 10px;font-size:13px}
textarea{min-height:100px}
@media(max-width:900px){
  .top-grid,.content-grid{grid-template-columns:1fr}
  .meta{grid-template-columns:1fr}
}
@media print{
  header,.top-grid,.left-stack,.status{display:none!important}
  main,.content-grid{display:block;padding:0}
  .sheet{box-shadow:none;border:0}
}


.practice-item{align-items:start}

.reward-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
.reward-row .card{
  min-width:0;
}
@media(max-width:700px){
  .reward-row{grid-template-columns:1fr}
}

.practice-item textarea{
  width:100%;
  min-width:0;
  min-height:44px;
  height:44px;
  max-height:none;
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px;
  font-size:16px;
  line-height:1.45;
  resize:none;
  overflow:hidden;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
}
.calendar-title{
  text-align:center;
  font-size:20px;
  font-weight:800;
  margin:0 0 10px;
}
#date{
width:100%;
min-width:0;
}

.video-url-row{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:8px;
  margin-bottom:10px;
}
.video-url-row input{min-width:0}
@media(max-width:600px){
  .video-url-row{grid-template-columns:1fr}
}

.speed-control{display:grid;grid-template-columns:auto minmax(120px,180px) 1fr;gap:8px;align-items:center;margin-top:10px;padding:10px;border:1px solid var(--line);border-radius:14px;background:#fffaf4}
.speed-control label{margin:0;font-weight:800;color:var(--ink)}
.speed-note{font-size:12px;color:#667085;line-height:1.5}
@media(max-width:700px){.speed-control{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<div class="brand">
<div class="logo">🎻</div>
<div><h1>ヴァイオリン れっすん</h1><div class="small">まいにち たのしく れんしゅうしよう</div></div>
</div>
<div class="top-actions">
<button id="saveBtn">ほぞん</button>
<button id="loadBtn">よみこみ</button>
<button class="blue" id="playBtn">▶ さいせい</button>
<button class="primary" onclick="window.print()">いんさつ</button>
</div>
</header>
<main>
<section class="top-grid"><div class="left-stack"><div class="card">
<h2>⏱ れんしゅう ストップウォッチ</h2>
<div class="stopwatch-time" id="stopwatchTime">00:00.0</div>
<div class="three">
<button class="green" id="swStart">スタート</button>
<button id="swStop">ストップ</button>
<button id="swReset">リセット</button>
</div>
</div><div class="card">
<h2>🌸 きょうの れんしゅう</h2>
<div class="practice-list" id="practiceList"></div>
<button class="primary" id="addPractice" style="width:100%;margin-top:10px">＋ れんしゅうを ふやす</button>
<button class="yellow" id="hanamaru" style="width:100%;margin-top:8px">💮 きょうの はなまる</button>
<div class="cheer" id="cheer">🎉 ぜんぶ できた！ すごいね！！</div>
</div></div><div class="card">
<h2>📺 きょうの どうが</h2><div class="video-url-row"><input id="videoUrl" inputmode="url" placeholder="ユーチューブの URLを いれてね" type="url"/><button class="primary" id="videoLoad">この どうがを つかう</button></div>
<div class="video-wrap"><div id="youtubePlayer"></div></div>
<div class="speed-control"><label for="videoSpeed">どうがの はやさ</label><select id="videoSpeed"><option value="0.5">0.5ばい</option><option value="0.75">0.75ばい</option><option selected="" value="1">1ばい</option><option value="1.25">1.25ばい</option><option value="1.5">1.5ばい</option><option value="1.75">1.75ばい</option><option value="2">2ばい</option><option value="3">3ばい</option><option value="4">4ばい</option><option value="5">5ばい</option><option value="6">6ばい</option><option value="7">7ばい</option><option value="8">8ばい</option><option value="9">9ばい</option><option value="10">10ばい</option></select><div class="speed-note">3ばいいじょうは、すこしずつ とばして すすむよ。</div></div><div class="video-controls">
<button class="blue" id="videoRestart">⏮ さいしょから</button>
<button id="videoPlay">▶ つづきから</button>
<button id="videoPause">⏸ とめる</button>
<button id="videoSlow75">🐢 0.75ばい</button>
<button id="videoSlow50">🐢 0.5ばい</button>
<button id="videoNormal">1ばい</button>
<button id="videoLoop">🔁 くりかえし: おふ</button>
</div>
</div></section>
<section class="content-grid"><div class="reward-row"><div class="card">
<h2>🏅 がんばった シール</h2>
<div class="stickers">
<div class="sticker" id="s1"><div style="font-size:30px">⭐</div><div>1にち</div></div>
<div class="sticker" id="s3"><div style="font-size:30px">🐰</div><div>3にち</div></div>
<div class="sticker" id="s7"><div style="font-size:30px">🐻</div><div>7にち</div></div>
<div class="sticker" id="s30"><div style="font-size:30px">🦁</div><div>30にち</div></div>
</div>
<div class="small" id="practiceDays" style="text-align:center;margin-top:10px"></div>
</div><div class="card">
<h2>📅 れんしゅう カレンダー</h2>
<div class="calendar-title" id="calendarTitle"></div><div class="calendar" id="calendar"></div>
</div></div><div class="card sheet">
<div class="meta">
<input id="title" value="がくふを つくろう"/>
<input id="student" placeholder="きょくの なまえ"/>
<input id="date" type="date"/>
</div>
<div class="score-wrap"><svg id="score" viewbox="0 0 1100 620"></svg></div>
<div class="status"><span class="pill" id="countStatus">0こ の おんぷ</span><span class="pill" id="barStatus">1 しょうせつ</span></div>
<div style="margin-top:14px">
<label>めも</label>
<textarea id="memo" placeholder="れい：ゆみを まっすぐに うごかそう"></textarea>
</div>
</div><div class="card">
<h2>🎵 おんぷを いれる</h2>
<div class="section">
<h3>おんぷの ながさ</h3>
<div class="note-buttons" id="durationButtons">
<button data-dur="4">𝅝<br/>ぜん</button>
<button data-dur="2">𝅗𝅥<br/>にぶ</button>
<button class="active" data-dur="1">♩<br/>しぶ</button>
<button data-dur="0.5">♪<br/>はちぶ</button>
</div>
</div>
<div class="section">
<h3>おとの たかさ</h3>
<div class="pitch-grid" id="pitchButtons"></div>
<div class="two" style="margin-top:8px"><button id="sharpBtn">♯</button><button id="flatBtn">♭</button></div>
</div>
<div class="section">
<div class="two">
<div><label>はやさ</label><input id="tempo" max="220" min="40" type="number" value="92"/></div>
<div><label>ひょうし</label><select id="meter"><option>4/4</option><option>3/4</option><option>2/4</option><option>6/8</option></select></div>
</div>
</div>
<div class="section">
<button class="primary" id="addBtn" style="width:100%">＋ おんぷを いれる</button>
<div class="two" style="margin-top:8px"><button id="restBtn">きゅうふ</button><button id="deleteBtn">さいごを けす</button></div>
<button id="clearBtn" style="width:100%;margin-top:8px">ぜんぶ けす</button>
</div>
</div></section>
</main>
<input accept=".json" hidden="" id="fileInput" type="file"/>
<script>
const KEY="violinLessonV2";
let state={
  practices:[
    {text:"ゆみを まっすぐ",done:false},
    {text:"どれみを ひく",done:false},
    {text:"きょくを 1かい ひく",done:false}
  ],
  goal:"",days:[],notes:[]
};
try{const s=JSON.parse(localStorage.getItem(KEY));if(s)state={...state,...s}}catch(e){}

function saveLocal(){localStorage.setItem(KEY,JSON.stringify(state))}
function today(){return new Date().toISOString().slice(0,10)}

const practiceList=document.getElementById("practiceList");
function renderPractice(){
  practiceList.innerHTML="";
  state.practices.forEach((p,i)=>{
    const row=document.createElement("div");row.className="practice-item";
    const c=document.createElement("input");c.type="checkbox";c.checked=p.done;c.onchange=()=>{p.done=c.checked;saveLocal();checkAll();};
    const t=document.createElement("textarea");
    t.rows=1;
    t.value=p.text;
    const fit=()=>{
      t.style.height="44px";
      t.style.height=Math.max(44,t.scrollHeight)+"px";
    };
    t.addEventListener("input",()=>{
      p.text=t.value;
      fit();
      saveLocal();
    });
    requestAnimationFrame(fit);
    const del=document.createElement("button");del.textContent="けす";del.onclick=()=>{state.practices.splice(i,1);saveLocal();renderPractice();checkAll()};
    row.append(c,t,del);practiceList.appendChild(row);
  });
}
function checkAll(){
  const all=state.practices.length>0&&state.practices.every(x=>x.done);
  document.getElementById("cheer").style.display=all?"block":"none";
}
document.getElementById("addPractice").onclick=()=>{state.practices.push({text:"あたらしい れんしゅう",done:false});saveLocal();renderPractice()};
document.getElementById("hanamaru").onclick=()=>{
  const d=today();if(!state.days.includes(d))state.days.push(d);
  saveLocal();renderStickers();renderCalendar();
  alert("💮 はなまる！ よく がんばったね！");
};
function renderStickers(){
  const n=state.days.length;
  [["s1",1],["s3",3],["s7",7],["s30",30]].forEach(([id,v])=>document.getElementById(id).classList.toggle("on",n>=v));
  document.getElementById("practiceDays").textContent=`れんしゅうした ひ：${n}にち`;
}
function renderCalendar(){
  const box=document.getElementById("calendar");
  if(!box)return;
  box.innerHTML="";
  const now=new Date();
  const y=now.getFullYear();
  const m=now.getMonth();
  const calendarTitle=document.getElementById("calendarTitle");
  if(calendarTitle)calendarTitle.textContent=`${y}ねん ${m+1}がつ`;
  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();
  for(let i=0;i<first;i++)box.appendChild(document.createElement("div"));
  for(let d=1;d<=last;d++){
    const x=document.createElement("div");
    x.className="day";
    x.textContent=d;
    const key=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    if(state.days.includes(key)){
      x.classList.add("done");
      x.textContent="🌸";
    }
    box.appendChild(x);
  }
}

let swStart=0,swElapsed=0,swTimer=null;
function fmt(ms){const t=Math.floor(ms/100),min=Math.floor(t/600),sec=Math.floor((t%600)/10);return `${String(min).padStart(2,"0")}:${String(sec).padStart(2,"0")}.${t%10}`}
function swUpdate(){document.getElementById("stopwatchTime").textContent=fmt(swElapsed+(performance.now()-swStart))}
document.getElementById("swStart").onclick=()=>{if(swTimer)return;swStart=performance.now();swTimer=setInterval(swUpdate,100)};
document.getElementById("swStop").onclick=()=>{if(!swTimer)return;swElapsed+=performance.now()-swStart;clearInterval(swTimer);swTimer=null;document.getElementById("stopwatchTime").textContent=fmt(swElapsed)};
document.getElementById("swReset").onclick=()=>{if(swTimer)clearInterval(swTimer);swTimer=null;swElapsed=0;document.getElementById("stopwatchTime").textContent="00:00.0"};

let player,loopOn=false;
let fastSeekTimer=null;
let chosenVideoSpeed=1;
let currentVideoId=localStorage.getItem("violinVideoId")||"A_AIidFDIWQ";


function stopFastSeek(){
  if(fastSeekTimer){clearInterval(fastSeekTimer);fastSeekTimer=null;}
}
function applyVideoSpeed(speed){
  chosenVideoSpeed=Number(speed)||1;
  stopFastSeek();
  if(!player)return;
  if(chosenVideoSpeed<=2){
    if(player.setPlaybackRate)player.setPlaybackRate(chosenVideoSpeed);
    return;
  }
  if(player.setPlaybackRate)player.setPlaybackRate(2);
  if(player.playVideo)player.playVideo();
  const tickMs=500;
  fastSeekTimer=setInterval(()=>{
    if(!player||!player.getCurrentTime||!player.seekTo)return;
    const st=player.getPlayerState?player.getPlayerState():1;
    if(st!==1)return;
    const extra=(chosenVideoSpeed-2)*(tickMs/1000);
    player.seekTo(player.getCurrentTime()+extra,true);
  },tickMs);
}

function getYouTubeId(url){
  try{
    const u=new URL(url.trim());
    if(u.hostname.includes("youtu.be")){
      return u.pathname.split("/").filter(Boolean)[0]||"";
    }
    if(u.searchParams.get("v"))return u.searchParams.get("v");
    const parts=u.pathname.split("/").filter(Boolean);
    const mark=parts.findIndex(x=>["shorts","embed","live"].includes(x));
    if(mark>=0&&parts[mark+1])return parts[mark+1];
  }catch(e){}
  const plain=url.trim();
  if(/^[A-Za-z0-9_-]{6,}$/.test(plain))return plain;
  return "";
}

window.onYouTubeIframeAPIReady=()=>{player=new YT.Player("youtubePlayer",{videoId:currentVideoId,playerVars:{playsinline:1,rel:0},events:{onStateChange:e=>{if(loopOn&&e.data===YT.PlayerState.ENDED){player.seekTo(0);player.playVideo()}}}})};

const videoSpeed=document.getElementById("videoSpeed");
if(videoSpeed)videoSpeed.onchange=()=>applyVideoSpeed(videoSpeed.value);

const videoUrl=document.getElementById("videoUrl");
if(videoUrl)videoUrl.value=`https://www.youtube.com/watch?v=${currentVideoId}`;
document.getElementById("videoLoad").onclick=()=>{
  const id=getYouTubeId(videoUrl.value);
  if(!id){
    alert("ユーチューブの URLを たしかめてね");
    return;
  }
  currentVideoId=id;
  localStorage.setItem("violinVideoId",id);
  videoUrl.value=`https://www.youtube.com/watch?v=${id}`;
  if(player&&player.loadVideoById)player.loadVideoById(id);
};

const api=document.createElement("script");api.src="https://www.youtube.com/iframe_api";document.head.appendChild(api);
function ready(fn){if(player&&player[fn])player[fn]()}
document.getElementById("videoRestart").onclick=()=>{if(player){player.seekTo(0);player.playVideo()}};
document.getElementById("videoPlay").onclick=()=>ready("playVideo");
document.getElementById("videoPause").onclick=()=>{stopFastSeek();ready("pauseVideo")};
document.getElementById("videoSlow75").onclick=()=>{if(videoSpeed)videoSpeed.value="0.75";applyVideoSpeed(0.75)};
document.getElementById("videoSlow50").onclick=()=>{if(videoSpeed)videoSpeed.value="0.5";applyVideoSpeed(0.5)};
document.getElementById("videoNormal").onclick=()=>{if(videoSpeed)videoSpeed.value="1";applyVideoSpeed(1)};
document.getElementById("videoLoop").onclick=e=>{loopOn=!loopOn;e.target.textContent=`🔁 くりかえし: ${loopOn?"おん":"おふ"}`};

const svg=document.getElementById("score"),NS="http://www.w3.org/2000/svg";
let notes=state.notes||[],selectedPitch="A4",selectedDur=1,accidental="",selectedIndex=-1,playing=false;
const pitches=["G3","A3","B3","C4","D4","E4","F4","G4","A4","B4","C5","D5","E5","F5","G5","A5"];
const solfege={C:"ド",D:"レ",E:"ミ",F:"ファ",G:"ソ",A:"ラ",B:"シ"};
function makePitchButtons(){
  const box=document.getElementById("pitchButtons");
  box.innerHTML="";
  pitches.forEach(p=>{
    const btn=document.createElement("button");
    btn.innerHTML=`<strong>${p}</strong><br><span>${solfege[p[0]]}</span>`;
    btn.dataset.pitch=p;
    if(p===selectedPitch)btn.classList.add("active");
    btn.onclick=()=>{
      selectedPitch=p;
      [...box.children].forEach(x=>x.classList.toggle("active",x===btn));
    };
    box.appendChild(btn);
  });
}
makePitchButtons();
document.querySelectorAll("#durationButtons button").forEach(b=>b.onclick=()=>{selectedDur=parseFloat(b.dataset.dur);document.querySelectorAll("#durationButtons button").forEach(x=>x.classList.toggle("active",x===b))});
document.getElementById("sharpBtn").onclick=()=>{accidental=accidental==="#"?"":"#";document.getElementById("sharpBtn").classList.toggle("active",accidental==="#");document.getElementById("flatBtn").classList.remove("active")};
document.getElementById("flatBtn").onclick=()=>{accidental=accidental==="b"?"":"b";document.getElementById("flatBtn").classList.toggle("active",accidental==="b");document.getElementById("sharpBtn").classList.remove("active")};
function addNote(){notes.push({pitch:selectedPitch,dur:selectedDur,acc:accidental,rest:false});state.notes=notes;saveLocal();render()}
document.getElementById("addBtn").onclick=addNote;
document.getElementById("restBtn").onclick=()=>{notes.push({dur:selectedDur,rest:true});state.notes=notes;saveLocal();render()};
document.getElementById("deleteBtn").onclick=()=>{notes.pop();state.notes=notes;saveLocal();render()};
document.getElementById("clearBtn").onclick=()=>{if(confirm("おんぷを ぜんぶ けしても いい？")){notes=[];state.notes=notes;saveLocal();render()}};

function el(n,a={},t=""){const x=document.createElementNS(NS,n);Object.entries(a).forEach(([k,v])=>x.setAttribute(k,v));if(t)x.textContent=t;return x}
function step(p){const o=["C","D","E","F","G","A","B"];return (parseInt(p.slice(-1))-4)*7+o.indexOf(p[0])}
function yPitch(p,y){return y+40-step(p)*5}
function head(x,y,fill){const g=el("g",{transform:`translate(${x} ${y}) rotate(-18)`});g.appendChild(el("ellipse",{cx:0,cy:0,rx:8,ry:5.5,fill:fill?"#24324a":"white",stroke:"#24324a","stroke-width":2}));return g}
function render(){
  svg.innerHTML="";svg.appendChild(el("rect",{x:0,y:0,width:1100,height:620,fill:"#fff"}));
  svg.appendChild(el("text",{x:550,y:35,"text-anchor":"middle","font-size":24,"font-weight":700},document.getElementById("title").value||"だいめいなし"));
  const meter=document.getElementById("meter").value,bpb=meter==="6/8"?3:parseInt(meter),systems=4,left=70,right=1040,gap=135,first=92;
  const total=Math.max(notes.reduce((s,n)=>s+n.dur,0),1),bars=Math.max(1,Math.ceil(total/bpb)),bps=Math.max(1,Math.ceil(bars/systems));
  let cur=0;
  for(let s=0;s<systems;s++){const y=first+s*gap;for(let i=0;i<5;i++)svg.appendChild(el("line",{x1:left,y1:y+i*10,x2:right,y2:y+i*10,stroke:"#222"}));svg.appendChild(el("text",{x:78,y:y+34,"font-size":54},"𝄞"));svg.appendChild(el("text",{x:132,y:y+18,"font-size":18},meter.split("/")[0]));svg.appendChild(el("text",{x:132,y:y+38,"font-size":18},meter.split("/")[1]));for(let b=0;b<=bps;b++){const x=165+b*(right-165)/bps;svg.appendChild(el("line",{x1:x,y1:y,x2:x,y2:y+40,stroke:"#333"}))}}
  notes.forEach((n,i)=>{const bar=Math.floor(cur/bpb),inbar=cur%bpb,sys=Math.floor(bar/bps);if(sys>=systems){cur+=n.dur;return}const bw=(right-165)/bps,x=165+(bar%bps)*bw+22+(inbar/bpb)*(bw-38),sy=first+sys*gap,g=el("g");
    if(n.rest)g.appendChild(el("text",{x,y:sy+27,"text-anchor":"middle","font-size":25},"𝄽"));
    else{
      const y=yPitch(n.pitch,sy);
      if(n.acc)g.appendChild(el("text",{x:x-17,y:y+6,"font-size":18},n.acc==="#"?"♯":"♭"));
      g.appendChild(head(x,y,n.dur<=1));
      g.appendChild(el("text",{
        x:x,
        y:sy+67,
        "text-anchor":"middle",
        "font-size":16,
        "font-weight":700,
        fill:"#496a62"
      },solfege[n.pitch[0]]));
      if(n.dur<4){
        const up=y>sy+20,sx=up?x+6:x-6,end=up?y-34:y+34;
        g.appendChild(el("line",{x1:sx,y1:y,x2:sx,y2:end,stroke:"#222","stroke-width":2}));
        if(n.dur===.5)g.appendChild(el("path",{d:up?`M ${sx} ${end} q 15 7 8 22`:`M ${sx} ${end} q -15 -7 -8 -22`,fill:"none",stroke:"#222","stroke-width":2}))
      }
    }
    svg.appendChild(g);cur+=n.dur;
  });
  document.getElementById("countStatus").textContent=`${notes.length}こ の おんぷ`;document.getElementById("barStatus").textContent=`${bars} しょうせつ`;
}
["title","tempo","meter"].forEach(id=>document.getElementById(id).addEventListener("input",render));
document.getElementById("date").valueAsDate=new Date();

function midi(p,a=""){const m={C:0,D:2,E:4,F:5,G:7,A:9,B:11};return (parseInt(p.slice(-1))+1)*12+m[p[0]]+(a==="#"?1:a==="b"?-1:0)}
function freq(m){return 440*Math.pow(2,(m-69)/12)}
async function play(){if(playing||!notes.length)return;playing=true;document.getElementById("playBtn").textContent="■ さいせいちゅう";const ctx=new (window.AudioContext||window.webkitAudioContext)(),beat=60/(parseInt(document.getElementById("tempo").value)||92);let t=ctx.currentTime+.05;notes.forEach(n=>{const len=n.dur*beat;if(!n.rest){const o=ctx.createOscillator(),g=ctx.createGain();o.type="triangle";o.frequency.value=freq(midi(n.pitch,n.acc));g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.18,t+.02);g.gain.exponentialRampToValueAtTime(.0001,t+Math.max(.08,len*.9));o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+len)}t+=len});setTimeout(()=>{playing=false;document.getElementById("playBtn").textContent="▶ さいせい";ctx.close()},(t-ctx.currentTime)*1000)}
document.getElementById("playBtn").onclick=play;

function snapshot(){return{...state,title:document.getElementById("title").value,student:document.getElementById("student").value,date:document.getElementById("date").value,tempo:document.getElementById("tempo").value,meter:document.getElementById("meter").value,memo:document.getElementById("memo").value,notes}}
document.getElementById("saveBtn").onclick=()=>{const b=new Blob([JSON.stringify(snapshot(),null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="ヴァイオリン-れっすん.json";a.click();URL.revokeObjectURL(a.href)};
document.getElementById("loadBtn").onclick=()=>document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);state={...state,...d};notes=d.notes||[];["title","student","date","tempo","meter","memo"].forEach(k=>{if(d[k]!==undefined)document.getElementById(k).value=d[k]});saveLocal();renderPractice();renderStickers();renderCalendar();render()}catch{alert("ふぁいるを よみこめなかったよ")}};r.readAsText(f)};

renderPractice();checkAll();renderStickers();renderCalendar();render();
</script>
</body>
